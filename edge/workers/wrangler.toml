name = "proxyhub-workers"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定
# 部署前替换 database_id 为实际 D1 数据库 ID
[[d1_databases]]
binding = "DB"
database_name = "proxyhub"
database_id = "YOUR_D1_DATABASE_ID"

[vars]
# 可在此配置环境变量
ENVIRONMENT = "production"
